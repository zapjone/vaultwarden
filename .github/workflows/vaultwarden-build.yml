name: Vaultwarden Build

on:
  workflow_dispatch:
    inputs:
      tag_choice:
        description: "版本选择"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - latest
          - custom
      tag:
        description: "自定义 commit"
        required: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 安装 Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          default: true

      - name: vaultwarden 版本选择
        id: get_tag
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.tag_choice }}" -eq "release") {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/dani-garcia/vaultwarden/releases/latest"
            echo "tag=$($release.tag_name)" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.event.inputs.tag_choice }}" -eq "latest") {
            echo "tag=latest" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.event.inputs.tag_choice }}" -eq "custom") {
            echo "tag=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          }

      - name: 设置版本号兜底
        id: set_version
        shell: pwsh
        run: |
          if ("${{ steps.get_tag.outputs.tag }}" -eq "") {
            echo "version=latest" >> $env:GITHUB_OUTPUT
          } else {
            echo "version=${{ steps.get_tag.outputs.tag }}" >> $env:GITHUB_OUTPUT
          }

      - name: 克隆 vaultwarden 仓库
        run: git clone https://github.com/dani-garcia/vaultwarden

      - name: 切换版本
        if: ${{ steps.get_tag.outputs.tag != '' }}
        run: git checkout ${{ steps.get_tag.outputs.tag }}
        working-directory: vaultwarden

      - name: 下载并解压 web-vault
        shell: pwsh
        run: |
          $Release = Invoke-RestMethod -Uri "https://api.github.com/repos/dani-garcia/bw_web_builds/releases/latest"
          $Asset = $Release.assets | Where-Object { $_.name -match "web.*\.tar\.gz$" } | Select-Object -First 1

          if (-not $Asset) {
            Write-Error "No web-vault tar.gz asset found."
            exit 1
          }

          $DownloadUrl = $Asset.browser_download_url
          $FileName = $Asset.name

          Write-Host "Downloading $FileName..."
          Invoke-WebRequest -Uri $DownloadUrl -OutFile $FileName

          Write-Host "Extracting..."
          tar -xzf $FileName -C vaultwarden
          # 把解压出来的 bw_web_xxx 重命名为 web-vault
          $dir = Get-ChildItem vaultwarden | Where-Object { $_.Name -like "bw_web*" }
          if ($dir) {
            Rename-Item -Path $dir.FullName -NewName "web-vault"
          }

      - name: 安装 vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: 使用 vcpkg 安装依赖
        run: |
          .\vcpkg\vcpkg.exe integrate install
          .\vcpkg\vcpkg.exe install openssl:x64-windows-static

      - name: 编译 vaultwarden
        run: cargo build --features sqlite --release
        working-directory: vaultwarden
        env:
          RUSTFLAGS: "-Ctarget-feature=+crt-static"

      - name: 重命名文件带版本号
        run: move .\vaultwarden\target\release\vaultwarden.exe .\vaultwarden_${{ steps.set_version.outputs.version }}.exe

      - name: 调整 web-vault 目录
        run: |
          move vaultwarden\web-vault .\web-vault

      - name: 打包文件
        uses: actions/upload-artifact@v4
        with:
          name: Vaultwarden_${{ steps.set_version.outputs.version }}
          path: |
            vaultwarden_${{ steps.set_version.outputs.version }}.exe
            web-vault
